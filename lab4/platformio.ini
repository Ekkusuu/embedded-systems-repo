; ============================================================
; Lab 4 – Button Duration Monitor with FreeRTOS Preemptive Tasks
; Part 2: Preemptive multitasking (FreeRTOS)
;
; Hardware: Arduino Uno (ATmega328P)
; Scheduler: FreeRTOS (feilipu/FreeRTOS)
;
; Synchronisation:
;   xButtonSemaphore – binary semaphore (Task1 → Task2 event signalling)
;   xStatsMutex      – mutex protecting gShared (Tasks 2 & 3)
; ============================================================

[platformio]
default_envs = freertos

[env:freertos]
platform          = atmelavr
board             = uno
framework         = arduino
monitor_speed     = 115200
; Heap raised to 950 bytes: 3 tasks + idle + 2 sync primitives (binary sem + mutex)
build_flags       = -DconfigTOTAL_HEAP_SIZE=950
lib_deps          = feilipu/FreeRTOS@^11.1.0-3
